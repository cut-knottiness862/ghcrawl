version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    labels:
      - dependencies
      - security
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/New_York
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
